name: Run Slide Builder Demo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-demo:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run demo script
      run: node demo.js
      
    - name: Build demo presentation
      run: |
        mkdir -p output
        npm run build:demo || true
        
    - name: List output files
      run: |
        echo "Output directory contents:"
        ls -lah output/ || echo "Output directory not found"
        
    - name: Upload demo presentation and outputs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: demo-presentation
        path: output/
        if-no-files-found: warn
                
    - name: Commit outputs to repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        mkdir -p demo-outputs
        cp -r output/* demo-outputs/ || true
        git add demo-outputs/ || true
        git commit -m "Update demo outputs [skip ci]" || true
        git push || true
